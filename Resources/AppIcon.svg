      <path d="M-44 -50 C-44 -60, -40 -64, -30 -64 C-40 -64, -44 -68, -44 -78 C-44 -68, -48 -64, -58 -64 C-48 -64, -44 -60, -44 -50 Z" fill="#ffffff" filter="url(#glow)"/>
