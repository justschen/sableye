      <path d="M-17.6 -42.5 L17.6 -42.5 L42.5 -17.6 L42.5 17.6 L17.6 42.5 L-17.6 42.5 L-42.5 17.6 L-42.5 -17.6 Z" fill="none" stroke="#aeb9da" stroke-width="2" opacity="0.6"/>
