      <stop offset="0.55" stop-color="#49b6ff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#49b6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gemFill" cx="0.42" cy="0.36" r="0.75">
