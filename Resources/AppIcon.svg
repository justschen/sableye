<svg width="1024" height="1024" viewBox="0 0 1024 1024"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241634"/>
      <stop offset="0.55" stop-color="#0d0818"/>
      <stop offset="1" stop-color="#030206"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.62">
      <stop offset="0.4" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.78"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="0.5" cy="0.5" r="0.5">
