    <use xlink:href="#gemEye" href="#gemEye" transform="translate(626 470) rotate(6) scale(1.0)"/>
    <rect x="3" y="3" width="1018" height="1018" rx="228" ry="228" fill="none" stroke="#9fb0ff" stroke-opacity="0.16" stroke-width="3"/>
